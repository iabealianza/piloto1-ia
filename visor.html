<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Visor IFC – Taller Pre‑aislado</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #viewer-container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

<div id="viewer-container"></div>

<!-- Carga de THREE.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>

<!-- Carga del visor IFC.js compatible con GitHub Pages -->
<script src="https://cdn.jsdelivr.net/npm/web-ifc-viewer@latest/dist/IFC.min.js"></script>

<script>
  const container = document.getElementById('viewer-container');

  // Crear visor
  const viewer = new IfcViewerAPI({
    container,
    backgroundColor: new Uint8Array([255, 255, 255])
  });

  // URL de tu IFC en GitHub RAW
  const IFC_URL = "https://raw.githubusercontent.com/iabealianza/piloto1-ia/refs/heads/main/taller_preaislado_ia.ifc";

  async function cargarIFC() {
    await viewer.IFC.loadIfcUrl(IFC_URL);
    viewer.context.renderer.postProduction.active = true;
  }

  cargarIFC();
</script>

</body>
</html>
